<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css">
  
</head>
<body class="bg-gradient-to-tr from-pink-100 via-purple-100 to-indigo-100 min-h-screen flex items-center justify-center">
    

    <div class="bg-white/70 p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-bold mb-6 text-purple-800">Life Calculator 🎀</h1>

    
<input type="number" id="ageInput" placeholder="Enter your age" 
            class="w-full p-4 mb-6 rounded-2xl border border-purple-200 text-center outline-none focus:ring-4 focus:ring-pink-200">

        <div class="grid grid-cols-2 gap-3 mb-6">
   <button onclick="calculate('Years')" class="bg-pink-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Years</button>
<button onclick="calculate('Months')" class="bg-purple-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Months</button>
<button onclick="calculate('Days')" class="bg-indigo-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Days</button>
<button onclick="calculate('Hours')" class="bg-blue-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Hours</button>
<button onclick="calculate('Minutes')" class="bg-teal-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Minutes</button>
<button onclick="calculate('Seconds')" class="bg-emerald-400 text-white p-3 rounded-xl font-bold hover:scale-105 transition">Seconds</button>
        </div>

        <div id="demo" class="bg-white/60 p-4 rounded-2xl border border-purple-100 min-h-[150px] flex flex-col items-center justify-center text-center">
    <p class="text-purple-700 text-lg font-medium">Click a button to see results! ✨</p>
</div>

    </div>







    </div>






</body>
<script src="src/script.js"></script>
</html>
